# ── ironmind toolchain ────────────────────────────────────────────────────────
# `mise install` sets up the complete dev environment:
#   Rust, Node, Doppler CLI, wrangler (via npm)
#
# Secrets are never in this file — always fetched from Doppler at runtime.
# Run `doppler setup` once to authenticate, then `mise run <task>` works.

[tools]
rust    = "stable"
node    = "22"
doppler = "latest"   # mise installs doppler CLI directly — no brew/curl needed

# ── Environment ───────────────────────────────────────────────────────────────
# Sets the default Doppler project+config for all tasks.
# Override per-command: DOPPLER_CONFIG=prd mise run worker-deploy
[env]
DOPPLER_PROJECT = "ironmind"
DOPPLER_CONFIG  = "dev"

# ── Rust tasks ────────────────────────────────────────────────────────────────

[tasks.check]
description = "Cargo check — no inference (CI safe, Linux)"
run = "cargo check --workspace"

[tasks.check-metal]
description = "Cargo check with Metal (Apple Silicon only)"
run = "cargo check --workspace --features metal"

[tasks.fmt]
description = "Format all Rust crates"
run = "cargo fmt --all"

[tasks.fmt-check]
description = "Check formatting (CI)"
run = "cargo fmt --all -- --check"

[tasks.clippy]
description = "Clippy lint — no inference (CI safe)"
run = "cargo clippy --workspace --all-targets -- -D warnings"

[tasks.clippy-metal]
description = "Clippy with Metal (Apple Silicon)"
run = "cargo clippy --workspace --all-targets --features metal -- -D warnings"

[tasks.test]
description = "Run all tests"
run = "cargo test --workspace"

[tasks.build]
description = "Release build with Metal (Apple Silicon M4 Max)"
run = "cargo build --release --workspace --features metal"

# ── Serve (secrets injected by doppler run) ───────────────────────────────────

[tasks.serve]
description = "Chat GUI — stub mode, no inference (dev secrets from Doppler)"
run = "doppler run -- cargo run --bin ironmind -- serve"

[tasks.serve-metal]
description = "Chat GUI — real Qwen3 inference (Metal + Doppler dev secrets)"
run = "doppler run -- cargo run --release --features metal --bin ironmind -- serve"

[tasks.run]
description = "Single prompt: mise run run -- \"create a bracket\""
run = "doppler run -- cargo run --release --features metal --bin ironmind -- run --prompt"

# ── User admin ────────────────────────────────────────────────────────────────

[tasks.user-create]
description = "Create a user: mise run user-create -- <id> <name>"
run = "doppler run -- cargo run --bin ironmind -- user create"

[tasks.user-rotate]
description = "Rotate token: mise run user-rotate -- <id>"
run = "doppler run -- cargo run --bin ironmind -- user rotate"

# ── CF Worker tasks ───────────────────────────────────────────────────────────

[tasks.worker-install]
description = "Install worker npm deps (wrangler, hono, zod)"
run = "cd worker && npm install"

[tasks.worker-dev]
description = "Run CF Worker locally with Doppler dev secrets"
run = "cd worker && doppler run -- npx wrangler dev"

[tasks.worker-deploy]
description = "Deploy CF Worker to Cloudflare (prd secrets)"
run = "cd worker && DOPPLER_CONFIG=prd doppler run -- npx wrangler deploy"

[tasks.worker-secrets-push]
description = "Sync Doppler prd secrets → CF Worker (wrangler secret put)"
run = """
cd worker
DOPPLER_CONFIG=prd doppler run -- sh -c '
  for var in IRONMIND_UPSTREAM_URL IRONMIND_SHARED_SECRET \
             IRONMIND_R2_ACCESS_KEY_ID IRONMIND_R2_SECRET_ACCESS_KEY \
             IRONMIND_R2_ACCOUNT_ID CLOUDFLARE_ACCOUNT_ID; do
    val=$(printenv "$var")
    if [ -n "$val" ]; then
      echo "$val" | npx wrangler secret put "$var"
    fi
  done
'
"""

[tasks.worker-ui-upload]
description = "Upload static UI to R2 so CF Worker can serve it"
run = """
doppler run -- npx wrangler r2 object put ironmind/static/index.html \
  --file crates/ironmind-web/static/index.html \
  --content-type text/html
"""

[tasks.worker-typecheck]
description = "TypeScript typecheck worker (no compile)"
run = "cd worker && npx tsc --noEmit"

# ── Tailscale ─────────────────────────────────────────────────────────────────

[tasks.tailscale-ip]
description = "Print this machine's Tailscale IP (run on Mac Mini)"
run = "tailscale ip -4"

[tasks.set-upstream]
description = "Auto-set IRONMIND_UPSTREAM_URL in Doppler prd from Tailscale IP"
run = """
IP=$(tailscale ip -4)
URL="http://$IP:3000"
doppler secrets set IRONMIND_UPSTREAM_URL="$URL" --project ironmind --config prd
echo "✓ Set IRONMIND_UPSTREAM_URL=$URL in Doppler prd"
"""

# ── Model ─────────────────────────────────────────────────────────────────────

[tasks.model-download]
description = "Download Qwen3-30B-A3B weights for offline factory deploy"
run = "huggingface-cli download Qwen/Qwen3-30B-A3B --local-dir ./models/qwen3-30b-a3b"

# ── Doppler helpers ───────────────────────────────────────────────────────────

[tasks.secrets]
description = "Print all secrets for current config (doppler dev by default)"
run = "doppler secrets --project ironmind"

[tasks.secrets-prd]
description = "Print all prd secrets"
run = "doppler secrets --project ironmind --config prd"

[tasks.secrets-plat-trunk]
description = "Print plat-trunk dev secrets (shared CF credentials)"
run = "doppler secrets --project plat-trunk --config dev"

# ── Bootstrap ─────────────────────────────────────────────────────────────────

[tasks.bootstrap]
description = "First-time setup — run once after cloning"
depends = ["worker-install"]
run = """
echo ""
echo "✓ Rust    $(rustc --version)"
echo "✓ Node    $(node --version)"
echo "✓ Doppler $(doppler --version)"
echo ""
echo "Next:"
echo "  doppler login                  # authenticate Doppler CLI"
echo "  doppler setup                  # link this dir to ironmind/dev"
echo ""
echo "  # Set R2 S3 keys in Doppler dashboard (needs CF dashboard token):"
echo "  # https://dash.cloudflare.com/7384af54e33b8a54ff240371ea368440/r2/api-tokens"
echo "  # IRONMIND_R2_ACCESS_KEY_ID"
echo "  # IRONMIND_R2_SECRET_ACCESS_KEY"
echo ""
echo "  mise run serve                 # start GUI (stub, no model)"
echo "  mise run model-download        # pull Qwen3-30B-A3B weights"
echo "  mise run serve-metal           # full inference"
echo "  mise run set-upstream          # register Mac Mini Tailscale IP"
echo "  DOPPLER_CONFIG=prd mise run worker-deploy  # deploy CF Worker"
"""
