[tools]
rust = "latest"

[tasks.check]
description = "Cargo check (no Metal — CI safe)"
run = "cargo check --no-default-features --features cpu"

[tasks.check-metal]
description = "Cargo check with Metal (Apple Silicon only)"
run = "cargo check --features metal"

[tasks.fmt]
description = "Format all crates"
run = "cargo fmt --all"

[tasks.fmt-check]
description = "Check formatting (CI)"
run = "cargo fmt --all -- --check"

[tasks.clippy]
description = "Clippy lint"
run = "cargo clippy --all-targets --no-default-features --features cpu -- -D warnings"

[tasks.test]
description = "Run tests"
run = "cargo test --all --no-default-features --features cpu"

[tasks.build]
description = "Release build (Metal)"
run = "cargo build --release --features metal"

[tasks.build-ci]
description = "Release build (CPU — CI safe)"
run = "cargo build --release --no-default-features --features cpu"

[tasks.model-download]
description = "Download Qwen3-30B-A3B weights for offline use"
run = "huggingface-cli download Qwen/Qwen3-30B-A3B --local-dir ./models/qwen3-30b-a3b"

[tasks.run]
description = "Run ironmind with default config"
run = "cargo run --release --features metal --bin ironmind -- --config ironmind.toml --prompt"
