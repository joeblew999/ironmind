name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: System deps
        run: sudo apt-get install -y libssl-dev pkg-config

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Fmt check
        run: mise run fmt-check

      - name: Clippy
        run: mise run clippy

      - name: Check
        run: mise run check

      - name: Test
        run: mise run test

  worker:
    name: Worker typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install worker deps
        run: mise run worker-install

      - name: Typecheck
        run: cd worker && npx tsc --noEmit
